<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="640" viewBox="0 0 1060 640" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real vaultvert session (output copied verbatim
       from a container run on 2026-07-13 against examples/bitwarden-vault.json). -->
  <rect width="1060" height="640" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">vaultvert — Bitwarden → KeePass, verified lossless</text>

  <g fill="#adbac7">
    <text x="24" y="66"><tspan fill="#6cb6ff">$</tspan> vaultvert convert examples/bitwarden-vault.json -o vault.xml</text>
    <text x="24" y="98" fill="#dcbdfb">vaultvert integrity report</text>
    <text x="24" y="122" fill="#768390">==========================</text>
    <text x="24" y="146">source : examples/bitwarden-vault.json (bitwarden-json), 4 entries</text>
    <text x="24" y="170">target : vault.xml (keepass-xml), 4 entries</text>
    <text x="24" y="194">digest : source <tspan fill="#96d0ff">6303f3a8…5c9a0bca</tspan></text>
    <text x="24" y="218">         target <tspan fill="#96d0ff">6303f3a8…5c9a0bca</tspan>  <tspan fill="#57ab5a">[match]</tspan></text>

    <text x="24" y="258" fill="#dcbdfb">field mapping</text>
    <text x="24" y="282" fill="#909dab">  field        -> target                       as         entries</text>
    <text x="24" y="306">  password     -> String[Password]             <tspan fill="#57ab5a">native</tspan>     2</text>
    <text x="24" y="330">  totp         -> String[otp]                  <tspan fill="#57ab5a">native</tspan>     1</text>
    <text x="24" y="354">  folder       -> Group nesting                <tspan fill="#57ab5a">native</tspan>     4</text>
    <text x="24" y="378">  favorite     -> vv:favorite custom string    <tspan fill="#e0b543">custom</tspan>     1</text>
    <text x="24" y="402">  url          -> String[URL]                  <tspan fill="#57ab5a">native</tspan>     2</text>
    <text x="24" y="426">  url          -> vv:url.N custom string       <tspan fill="#e0b543">custom</tspan>     1</text>
    <text x="24" y="450" fill="#768390">  … 9 more rows …</text>

    <text x="24" y="490">verdict: <tspan fill="#57ab5a" font-weight="bold">LOSSLESS</tspan> — all 4 entries round-trip verified</text>

    <text x="24" y="538"><tspan fill="#6cb6ff">$</tspan> vaultvert merge bitwarden.json keepass.xml onepassword.1pif -o merged.json</text>
    <text x="24" y="566">merge: 3 inputs, 8 entries in, <tspan fill="#e0b543">2 duplicates merged</tspan> (0 password conflicts</text>
    <text x="24" y="590">preserved), 6 entries out</text>
    <text x="24" y="618">verdict: <tspan fill="#57ab5a" font-weight="bold">LOSSLESS</tspan> — all 6 entries round-trip verified</text>
  </g>
</svg>
